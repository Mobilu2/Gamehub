<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Standings - GameHub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .standings-container {
            max-width: 1200px;
            margin: 2rem auto;
            background: var(--light-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .standings-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .standings-table th,
        .standings-table td {
            padding: 0.75rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .standings-table th {
            background: var(--dark-bg);
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .standings-table tbody tr:hover {
            background: rgba(107, 95, 255, 0.05);
        }

        .position {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .team-name {
            text-align: left;
            font-weight: 500;
        }

        .stats-positive {
            color: #4CAF50;
        }

        .stats-negative {
            color: #F44336;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--border-color);
        }

        .no-data {
            text-align: center;
            padding: 2rem;
            color: var(--border-color);
        }

        .league-info {
            background: rgba(78, 205, 196, 0.1);
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--secondary-color);
            margin-bottom: 1rem;
        }

        .player-stats-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .stats-card {
            background: var(--dark-bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stats-card h3 {
            margin: 0 0 1rem 0;
            color: var(--primary-color);
        }

        .stats-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-item:last-child {
            border-bottom: none;
        }

        .player-name {
            font-weight: 500;
        }

        .player-stat {
            font-weight: bold;
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .standings-container {
                margin: 1rem;
                padding: 1rem;
            }

            .standings-table {
                font-size: 0.85rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="index.html" style="text-decoration: none; color: white;">
                <h1>🎮 GameHub</h1>
            </a>
        </div>
        <div class="navbar-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="leagues.html" class="nav-link">Leagues</a>
            <a href="teams.html" class="nav-link">Teams</a>
            <div id="userMenu" class="user-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="message" class="message"></div>

        <div class="standings-container">
            <div class="standings-header">
                <h1>League Standings</h1>
                <div id="leagueInfo" class="league-info">
                    <h3 id="leagueName">Loading...</h3>
                    <p id="leagueDetails">Loading league details...</p>
                </div>
            </div>

            <div id="standingsContent">
                <div class="loading">Loading standings...</div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Get league ID from URL
        const params = new URLSearchParams(window.location.search);
        const leagueId = params.get('league_id');

        if (!leagueId) {
            showMessage('Invalid league ID', 'error');
        }

        // Load league standings
        async function loadStandings() {
            try {
                const response = await fetch(`/api/leagues/${leagueId}/standings`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message);
                }

                displayLeagueInfo(data.league);
                displayStandings(data.standings);

                // Load player statistics for all leagues
                await loadPlayerStats(leagueId);
            } catch (error) {
                showMessage('Error loading standings: ' + error.message, 'error');
                document.getElementById('standingsContent').innerHTML = '<div class="no-data">Unable to load standings</div>';
            }
        }

        // Display league information
        function displayLeagueInfo(league) {
            document.getElementById('leagueName').textContent = league.name;
            document.getElementById('leagueDetails').textContent = `${league.game} • ${league.max_participants || 'N/A'} teams • ${league.status || 'Active'}`;
        }

        // Display standings table
        function displayStandings(standings) {
            if (!standings || standings.length === 0) {
                document.getElementById('standingsContent').innerHTML = '<div class="no-data">No standings available yet</div>';
                return;
            }

            const tableHtml = `
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th style="text-align: left;">Team</th>
                            <th>P</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th>GF</th>
                            <th>GA</th>
                            <th>GD</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${standings.map((standing, index) => `
                            <tr>
                                <td class="position">${index + 1}</td>
                                <td class="team-name">${standing.team_name}</td>
                                <td>${standing.played}</td>
                                <td>${standing.won}</td>
                                <td>${standing.drawn}</td>
                                <td>${standing.lost}</td>
                                <td>${standing.goals_for}</td>
                                <td>${standing.goals_against}</td>
                                <td class="${standing.goal_difference >= 0 ? 'stats-positive' : 'stats-negative'}">${standing.goal_difference > 0 ? '+' : ''}${standing.goal_difference}</td>
                                <td><strong>${standing.points}</strong></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('standingsContent').innerHTML = tableHtml;
        }

        // Load player statistics for eFootball leagues
        async function loadPlayerStats(leagueId) {
            try {
                const response = await fetch(`/api/leagues/${leagueId}/player-stats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayPlayerStats(data.stats);
                }
            } catch (error) {
                console.log('Error loading player stats:', error);
            }
        }

        // Display player statistics
        function displayPlayerStats(stats) {
            const statsHtml = `
                <div class="player-stats-section">
                    <h2>Player Statistics</h2>
                    <div class="stats-grid">
                        <div class="stats-card">
                            <h3>🏆 Top Scorers</h3>
                            <ul class="stats-list">
                                ${stats.topScorers && stats.topScorers.length > 0 ?
                                    stats.topScorers.map(player => `
                                        <li class="stats-item">
                                            <span class="player-name">${player.player_name}</span>
                                            <span class="player-stat">${player.goals} goals</span>
                                        </li>
                                    `).join('') :
                                    '<li class="stats-item"><span>No goals scored yet</span></li>'
                                }
                            </ul>
                        </div>
                        <div class="stats-card">
                            <h3>🎯 Top Assists</h3>
                            <ul class="stats-list">
                                ${stats.topAssists && stats.topAssists.length > 0 ?
                                    stats.topAssists.map(player => `
                                        <li class="stats-item">
                                            <span class="player-name">${player.player_name}</span>
                                            <span class="player-stat">${player.assists} assists</span>
                                        </li>
                                    `).join('') :
                                    '<li class="stats-item"><span>No assists recorded yet</span></li>'
                                }
                            </ul>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('standingsContent').insertAdjacentHTML('beforeend', statsHtml);
        }

        function showMessage(message, type) {
            const el = document.getElementById('message');
            el.textContent = message;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Initialize
        if (leagueId) {
            loadStandings();
        }
    </script>
</body>
</html>
